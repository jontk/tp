version: 2

project_name: ratatosk

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/tosk
    binary: tosk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^style:"
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jontk
    name: ratatosk
