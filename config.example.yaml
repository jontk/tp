# tp - tmux project manager configuration
#
# Config location: ~/.config/tmux-projects/config.yaml
# Created automatically on first run with sensible defaults.

# Directories to scan for projects.
# Each subdirectory within these paths becomes a selectable project.
source_dirs:
    - ~/src/github.com/myuser
    - ~/src/github.com/myorg

# Projects pre-selected in the picker on launch.
defaults:
    - my-api
    - my-webapp

# Tmux session name.
session: projects

# Layout as sequential tmux splits.
#
# The first entry is the initial pane (no split). Each subsequent entry
# splits the last created pane.
#
#   split:    horizontal (side-by-side) or vertical (top/bottom)
#   percent:  size of the new pane as a percentage
#   command:  command to run in the pane (empty string = interactive shell)
#   active:   which pane receives focus (only one should be true)
#
# tp is layout- and tool-agnostic: put any command you like in a pane.
# Editors (vim/nvim/emacs/helix), shells, watchers (entr/watchexec),
# log tailers (kubectl logs, docker compose logs), TUIs (lazygit, k9s,
# htop), AI agents (claude, aider, codex, gemini) — all fair game.
#
# Default layout: vim (left) | shell (top-right, active) / lazygit (bottom-right)
#
#   ┌──────────────┬──────────────┐
#   │              │    shell     │
#   │    vim .     │   (active)   │
#   │              ├──────────────┤
#   │              │   lazygit    │
#   └──────────────┴──────────────┘
#
layout:
    - command: vim .
    - split: horizontal
      percent: 40
      command: ""
      active: true
    - split: vertical
      percent: 50
      command: lazygit

# Reusable layout presets.
# Define layouts once and reference them by name in project configs.
#
# The examples below show a few common workflow archetypes. Mix and match,
# rename, or replace any of them to fit how you actually work.
#
# layout_presets:
#
#     # Editor-centric: just vim, a shell, and lazygit. Zero assumptions.
#     #
#     #   ┌──────────────┬──────────────┐
#     #   │              │    shell     │
#     #   │    vim .     ├──────────────┤
#     #   │              │   lazygit    │
#     #   └──────────────┴──────────────┘
#     editor:
#         - command: vim .
#         - split: horizontal
#           percent: 40
#           command: ""
#           active: true
#         - split: vertical
#           percent: 50
#           command: lazygit
#
#     # Frontend: editor + dev server + test watcher + shell.
#     #
#     #   ┌──────────────┬──────────────┐
#     #   │              │    vim .     │
#     #   │   npm run    ├──────────────┤
#     #   │     dev      │  npm test    │
#     #   │              ├──────────────┤
#     #   │              │    shell     │
#     #   └──────────────┴──────────────┘
#     frontend:
#         - command: npm run dev
#         - split: horizontal
#           percent: 60
#           command: vim .
#         - split: vertical
#           percent: 66
#           command: npm test -- --watch
#         - split: vertical
#           percent: 50
#           command: ""
#           active: true
#
#     # Ops: logs tailing alongside an editor and a shell.
#     #
#     #   ┌──────────────┬──────────────┐
#     #   │              │    vim .     │
#     #   │    k9s       ├──────────────┤
#     #   │              │    shell     │
#     #   └──────────────┴──────────────┘
#     ops:
#         - command: k9s
#         - split: horizontal
#           percent: 60
#           command: vim .
#         - split: vertical
#           percent: 50
#           command: ""
#           active: true
#
#     # AI-assisted: put an agent on the left, editor and shell on the right.
#     # Swap `claude` for `aider`, `codex`, `gemini`, etc. as you like.
#     #
#     #   ┌──────────────┬──────────────┐
#     #   │              │    vim .     │
#     #   │   claude     ├──────────────┤
#     #   │              │    shell     │
#     #   └──────────────┴──────────────┘
#     agent:
#         - command: claude --continue || claude
#         - split: horizontal
#           percent: 60
#           command: vim .
#         - split: vertical
#           percent: 50
#           command: ""
#           active: true

# Per-project layout overrides.
# Projects can use preset: to reference a named layout, or inline layout:
# for one-offs. Inline layout takes priority if both are set.
#
# projects:
#     my-webapp:
#         preset: frontend
#     infra:
#         preset: ops
#     dotfiles:
#         preset: editor
#
# Example: Go backend with a test watcher pane
#
#   ┌──────────────┬──────────────┐
#   │              │   vim .      │
#   │   go test    ├──────────────┤
#   │   (watch)    │    shell     │
#   └──────────────┴──────────────┘
#
# projects:
#     my-api:
#         layout:
#             - command: watchexec -e go -- go test ./...
#             - split: horizontal
#               percent: 60
#               command: vim .
#             - split: vertical
#               percent: 50
#               command: ""
#               active: true
#
# Example: database work — psql open, editor, shell
#
#   ┌──────────────┬──────────────┐
#   │              │   vim .      │
#   │    psql      ├──────────────┤
#   │              │    shell     │
#   └──────────────┴──────────────┘
#
# projects:
#     analytics:
#         layout:
#             - command: psql $DATABASE_URL
#             - split: horizontal
#               percent: 60
#               command: vim .
#             - split: vertical
#               percent: 50
#               command: ""
#               active: true
#
# Example: wide-screen 3-column layout
#
#   ┌──────────┬──────────┬──────────┐
#   │          │          │  shell   │
#   │  lazygit │   vim    ├──────────┤
#   │          │          │  shell   │
#   └──────────┴──────────┴──────────┘
#
# projects:
#     big-project:
#         layout:
#             - command: lazygit
#             - split: horizontal
#               percent: 66
#               command: vim .
#             - split: horizontal
#               percent: 50
#               command: ""
#             - split: vertical
#               percent: 50
#               command: ""
#               active: true
