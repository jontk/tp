# tp - tmux project manager configuration
#
# Config location: ~/.config/tmux-projects/config.yaml
# Created automatically on first run with sensible defaults.

# Directories to scan for projects.
# Each subdirectory within these paths becomes a selectable project.
source_dirs:
    - /mnt/export/jontk/src/github.com/jontk
    - /mnt/export/jontk/src/github.com/brokkr

# Projects pre-selected in the picker on launch.
defaults:
    - nixconf
    - s9s

# Tmux session name.
session: projects

# Layout as sequential tmux splits.
#
# The first entry is the initial pane (no split). Each subsequent entry
# splits the last created pane.
#
#   split:    horizontal (side-by-side) or vertical (top/bottom)
#   percent:  size of the new pane as a percentage
#   command:  command to run in the pane (empty string = interactive shell)
#   active:   which pane receives focus (only one should be true)
#
# Default layout: claude (left 40%) | vim (top-right) / shell (bottom-right)
#
#   ┌──────────────┬──────────────┐
#   │              │   vim .      │
#   │   claude     │              │
#   │   --continue ├──────────────┤
#   │              │    shell     │
#   │              │  (active)    │
#   └──────────────┴──────────────┘
#
layout:
    - command: claude --continue || claude
    - split: horizontal
      percent: 60
      command: vim .
    - split: vertical
      percent: 50
      command: ""
      active: true

# Per-project layout overrides.
# Any project listed here uses its own layout instead of the global one.
#
# Example: s9s-web with a dev server pane
#
#   ┌──────────────┬──────────────┐
#   │              │   vim .      │
#   │   claude     ├──────────────┤
#   │   --continue │  npm run dev │
#   │              ├──────────────┤
#   │              │    shell     │
#   └──────────────┴──────────────┘
#
# projects:
#     s9s-web:
#         layout:
#             - command: claude --continue || claude
#             - split: horizontal
#               percent: 60
#               command: vim .
#             - split: vertical
#               percent: 66
#               command: npm run dev
#             - split: vertical
#               percent: 50
#               command: ""
#               active: true
#
# Example: wide-screen 3-column layout
#
#   ┌──────────┬──────────┬──────────┐
#   │          │          │  shells  │
#   │  claude  │   vim    ├──────────┤
#   │          │          │  shells  │
#   └──────────┴──────────┴──────────┘
#
# projects:
#     big-project:
#         layout:
#             - command: claude --continue || claude
#             - split: horizontal
#               percent: 66
#               command: vim .
#             - split: horizontal
#               percent: 50
#               command: ""
#             - split: vertical
#               percent: 50
#               command: ""
#               active: true
